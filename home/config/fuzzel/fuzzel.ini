[main]
font=Inter:size=13,/home/username/.local/share/fonts/truetype/noto/NotoColorEmoji.ttf:size=13
dpi-aware=yes
terminal=alacritty

prompt=""
placeholder="Search"

icon-theme=Papirus-Dark-Purple

# Modal geometry — match Walker scale
width=52
lines=10

# Row height — Walker-like density
line-height=34

# Padding — much tighter like Walker
horizontal-pad=12
vertical-pad=10
inner-pad=8


# Colors live in themes/noctalia (generated by Noctalia, auto-follows wallpaper).
include=/home/username/.config/fuzzel/themes/noctalia

[border]
width=1
radius=10
