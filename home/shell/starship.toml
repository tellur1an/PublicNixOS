# Starship — tide/fish replica
# Colors from noctalia palette: green = accent, subtext0 = secondary, overlay1 = dim
"$schema" = 'https://starship.rs/config-schema.json'
palette = "noctalia"

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$character"""

add_newline = true

# ── Directory ──────────────────────────────────────────────────────────────
[directory]
format            = '[$path]($style)[$read_only]($read_only_style) '
style             = 'bold white'
read_only         = ' '
read_only_style   = 'red'
truncate_to_repo  = false
truncation_length = 4
truncation_symbol = '…/'
home_symbol       = '~'

# ── Git branch ────────────────────────────────────────────────────────────
[git_branch]
format = '[#](bold subtext0)[$branch(:$remote_branch)]($style) '
style  = 'bold green'
symbol = ''
truncation_length = 24
truncation_symbol = '…'

# ── Git state (rebase, merge, etc.) ──────────────────────────────────────
[git_state]
format = '[\($state( $progress_current/$progress_total)\)]($style) '
style  = 'bold yellow'

# ── Git status ────────────────────────────────────────────────────────────
[git_status]
format     = '([$all_status$ahead_behind]($style) )'
style      = 'bold green'
conflicted = '!'
ahead      = '⇡${count}'
behind     = '⇣${count}'
diverged   = '⇕⇡${ahead_count}⇣${behind_count}'
untracked  = '?'
stashed    = '$'
modified   = '~'
staged     = '+'
renamed    = '»'
deleted    = '✘'

# ── Prompt character (❯ like tide) ────────────────────────────────────────
[character]
success_symbol = '[❯](bold green)'
error_symbol   = '[❯](bold red)'
vimcmd_symbol  = '[❮](bold green)'

# ── Command duration ──────────────────────────────────────────────────────
[cmd_duration]
min_time           = 2000
format             = '[$duration]($style) '
style              = 'overlay1'
show_notifications = false

# ── Languages (matching tide right-side items) ────────────────────────────
[python]
format            = '[$symbol$version]($style) '
symbol            = ' '
style             = 'green'
detect_extensions = ['py']
detect_files      = ['requirements.txt', 'setup.py', 'pyproject.toml', '.python-version']

[rust]
format = '[$symbol$version]($style) '
symbol = ' '
style  = 'green'

[golang]
format = '[$symbol$version]($style) '
symbol = ' '
style  = 'green'

[nodejs]
format = '[$symbol$version]($style) '
symbol = ' '
style  = 'green'

[zig]
format = '[$symbol$version]($style) '
symbol = ' '
style  = 'green'

[bun]
format = '[$symbol$version]($style) '
style  = 'green'

[java]
format = '[$symbol$version]($style) '
style  = 'green'

# ── Context — only show on SSH or root ───────────────────────────────────
[username]
format      = '[$user]($style)@'
style_user  = 'subtext0'
style_root  = 'bold red'
show_always = false

[hostname]
format   = '[$ssh_symbol$hostname]($style) '
style    = 'subtext0'
ssh_only = true

# ── Jobs ─────────────────────────────────────────────────────────────────
[jobs]
format           = '[$symbol$number]($style) '
symbol           = '✦'
style            = 'green'
number_threshold = 1
symbol_threshold = 1

# ── Exit status ───────────────────────────────────────────────────────────
[status]
format   = '[$symbol$status]($style) '
symbol   = '✘'
style    = 'bold red'
disabled = false

# Disable unused modules
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[terraform]
disabled = true
[kubernetes]
disabled = true
[package]
disabled = true
[docker_context]
disabled = true



















































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































































