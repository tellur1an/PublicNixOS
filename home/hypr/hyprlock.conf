general {
    grace = 2
    lock_cmd = pidof hyprlock || hyprlock
    unlock_cmd = notify-send "Welcome back!"
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

background {
    monitor =
    path = ~/.config/hypr/pika-dev-paper.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.1
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.5
}

/* Time */
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(234, 245, 255, 1.0)   # mono near-white
    font_size = 72
    font_family = Inter
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
}

/* Date */
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(210, 225, 240, 1.0)   # dim text
    font_size = 20
    font_family = Inter
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.3)
}

/* Avatar (square, neutral) */
image {
    monitor =
    path = ~/.face
    size = 120
    rounding = 0
    border_size = 1
    border_color = rgba(255, 255, 255, 0.18)  # light line
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.35)
}

/* Password (square, dark glass) */
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.20
    dots_spacing = 0.20
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 255, 255, 0.18)   # subtle light border
    inner_color = rgba(12, 20, 32, 0.82)      # dark glass
    font_color  = rgba(234, 245, 255, 1.0)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = Enter Password
    hide_input = false
    rounding = 0
    check_color = rgba(180, 220, 200, 1.0)    # subdued success
    fail_color  = rgba(239, 68, 68, 1.0)
    fail_text   = Authentication failed
    fail_timeout = 2000
    fail_transitions = 300
    capslock_color = rgba(245, 158, 11, 1.0)
    numlock_color  = rgba(203, 213, 225, 1.0) # neutral instead of blue
    bothlock_color = rgba(203, 213, 225, 1.0)
    invert_numlock = false
    swap_font_color = false
    position = 0, -220
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.3)
}

/* Username */
label {
    monitor =
    text = $USER
    color = rgba(203, 213, 225, 1.0)
    font_size = 16
    font_family = Inter
    position = 0, -170
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.3)
}

/* Battery (if present) */
label {
    monitor =
    text = cmd[update:30000] echo "$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1)" || echo ""
    color = rgba(203, 213, 225, 0.85)
    font_size = 12
    font_family = Inter
    position = 30, 30
    halign = left
    valign = bottom
}