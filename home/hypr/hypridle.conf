general {
    # Use Noctalia / Quickshell lock screen
    lock_cmd = noctalia msg session lock
    before_sleep_cmd = noctalia msg session lock

    # optional; usually fine to keep false
    ignore_dbus_inhibit = false
}

# First stage: lock the screen using Noctalia
listener {
    timeout = 300   # 5 minutes (change as you like)
    on-timeout = noctalia msg session lock
    on-resume = echo "unlock" >/dev/null
}

# Second stage: turn displays off
listener {
    timeout = 600   # 10 minutes
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
